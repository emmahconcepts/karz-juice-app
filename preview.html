<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Karz Juice EMS — Live Preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1E1512;--surface:#2A1E1B;--surface2:#33221E;--surface3:#3d2820;
  --orange:#FF9800;--green:#0B6623;--red:#D32F2F;--amber:#F59E0B;
  --text:#F5F5F5;--muted:#CFC4BC;--dim:#8a7870;
  --border:rgba(255,255,255,0.07);--card-border:rgba(255,255,255,0.1);
  --r:10px;--r-sm:6px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
/* ── Layout ─────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
/* ── Sidebar ────────────────────────── */
#sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
#sidebar.collapsed{width:52px}
.sb-logo{display:flex;align-items:center;gap:10px;padding:14px 12px;border-bottom:1px solid var(--border);min-height:52px}
.sb-badge{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#FF9800,#0B6623);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0}
.sb-title{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden}
.sb-toggle{background:none;border:none;cursor:pointer;padding:5px;color:var(--muted);border-radius:5px;display:flex;align-items:center;margin-left:auto;flex-shrink:0}
.sb-toggle:hover{background:rgba(255,255,255,.06)}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 4px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border)}
.sb-group-label{padding:10px 10px 4px;font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;overflow:hidden}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--muted);margin-bottom:1px;transition:all .15s;white-space:nowrap;overflow:hidden}
.sb-item:hover{background:rgba(255,152,0,.08);color:var(--text)}
.sb-item.active{background:rgba(255,152,0,.15);color:var(--orange);font-weight:600}
.sb-item svg{flex-shrink:0;width:15px;height:15px}
.collapsed .sb-group-label,.collapsed .sb-item span{display:none}
.sb-footer{padding:10px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px;border-radius:8px}
.sb-user:hover{background:rgba(255,255,255,.05)}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--orange);flex-shrink:0}
/* ── Main ───────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;background:rgba(30,21,18,.95);backdrop-filter:blur(8px);gap:12px}
#page-label{font-size:12px;color:var(--muted);white-space:nowrap}
#search-wrap{flex:1;max-width:320px;margin-left:auto}
.search-btn{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;width:100%;transition:border-color .15s}
.search-btn:hover{border-color:rgba(255,152,0,.3)}
.search-kbd{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px;font-family:monospace}
#content{flex:1;overflow-y:auto;padding:20px 24px}
#content::-webkit-scrollbar{width:5px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ── Cards / UI ─────────────────────── */
.card{background:var(--surface);border:1px solid var(--card-border);border-radius:var(--r);padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--card-border);border-radius:var(--r);padding:14px}
.kpi-label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-bottom:6px}
.kpi-val{font-size:20px;font-weight:700}
.kpi-trend{font-size:10px;color:var(--muted);margin-top:3px}
.orange{color:var(--orange)}.green{color:#4caf50}.red{color:var(--red)}.amber{color:var(--amber)}
/* ── Buttons ────────────────────────── */
.btn{border:none;border-radius:var(--r-sm);padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.98)}
.btn-primary{background:var(--orange);color:#111}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(211,47,47,.15);color:var(--red);border:1px solid rgba(211,47,47,.3)}
.btn-sm{padding:5px 10px;font-size:11px}
/* ── Forms ──────────────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:var(--muted);font-weight:500}
.form-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:12px;color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--orange)}
.form-input::placeholder{color:var(--dim)}
select.form-input{cursor:pointer}
/* ── Table ──────────────────────────── */
.tbl{width:100%;font-size:12px;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:11px}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
/* ── Badges ─────────────────────────── */
.badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600}
.badge-green{background:rgba(11,102,35,.25);color:#4caf50}
.badge-amber{background:rgba(255,152,0,.15);color:var(--orange)}
.badge-red{background:rgba(211,47,47,.2);color:var(--red)}
.badge-blue{background:rgba(33,150,243,.15);color:#64b5f6}
.badge-muted{background:rgba(255,255,255,.07);color:var(--muted)}
/* ── Alert bar ──────────────────────── */
.alert-bar{border-left:3px solid var(--red);background:rgba(211,47,47,.08);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.alert-bar.amber{border-left-color:var(--amber);background:rgba(245,158,11,.08)}
/* ── Charts (CSS bars) ──────────────── */
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:90px;margin-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.bar-lbl{font-size:9px;color:var(--dim)}
/* ── Progress ───────────────────────── */
.progress{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--orange),var(--green))}
/* ── Tabs ───────────────────────────── */
.tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tab{padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;border-radius:var(--r-sm) var(--r-sm) 0 0}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:600;background:rgba(255,152,0,.05)}
.tab:hover:not(.active){color:var(--text)}
/* ── Toast ──────────────────────────── */
#toast{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:var(--surface3);border:1px solid var(--card-border);border-radius:var(--r);padding:10px 14px;font-size:12px;max-width:280px;animation:toast-in .25s ease;display:flex;align-items:center;gap:8px}
.toast-item.success{border-left:3px solid #4caf50}
.toast-item.error{border-left:3px solid var(--red)}
@keyframes toast-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* ── Modal ──────────────────────────── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:16px}
#modal-overlay.open{display:flex}
#modal-box{background:var(--surface);border:1px solid var(--card-border);border-radius:var(--r);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:16px}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;font-size:18px;line-height:1}
.close-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
/* ── Search overlay ─────────────────── */
#search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-start;justify-content:center;padding-top:80px}
#search-overlay.open{display:flex}
#search-box{background:var(--surface);border:1px solid rgba(255,152,0,.3);border-radius:var(--r);width:100%;max-width:520px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.search-input-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
#search-input{background:transparent;border:none;outline:none;font-size:14px;color:var(--text);flex:1}
#search-input::placeholder{color:var(--dim)}
#search-results{max-height:320px;overflow-y:auto}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.sr-item:hover{background:rgba(255,152,0,.07)}
.sr-type{font-size:10px;padding:2px 7px;border-radius:10px;flex-shrink:0}
/* ── Shop page ──────────────────────── */
.shop-hero{background:linear-gradient(135deg,#FF9800,#e65100 55%,#0B6623);padding:24px;border-radius:var(--r);margin-bottom:16px;color:#fff;text-align:center}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.product-card{background:#fff;border-radius:var(--r);overflow:hidden;color:#111}
.product-emoji{background:linear-gradient(135deg,#fff8f0,#f0faf4);padding:18px;text-align:center;font-size:32px}
.product-info{padding:10px}
.product-name{font-weight:700;font-size:13px}
.product-price{color:var(--orange);font-weight:700;font-size:12px;margin:3px 0 6px}
.add-to-cart{width:100%;background:#0B6623;color:#fff;border:none;border-radius:6px;padding:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.add-to-cart:hover{background:#0d7a2b}
.qty-ctrl{display:flex;align-items:center;gap:6px;width:100%}
.qty-btn{background:#0B6623;border:none;border-radius:5px;width:26px;height:26px;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.qty-btn.minus{background:rgba(255,255,255,.15);color:#333}
.qty-num{flex:1;text-align:center;font-weight:700;font-size:14px;color:#111}
/* ── Sticky cart bar ────────────────── */
#cart-bar{position:fixed;bottom:0;left:0;right:0;background:#0B6623;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:50;transform:translateY(100%);transition:transform .25s}
#cart-bar.visible{transform:translateY(0)}
</style>
</head>

<div id="toast"></div>

<!-- Search overlay -->

function icon(k,sz=15){return`<svg width="${sz}" height="${sz}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${ICONS[k]||''}</svg>`}

// ── Build sidebar ─────────────────────────────────────────────────────────────
function buildSidebar(){
  const el=document.getElementById('nav-scroll');
  el.innerHTML=NAV.map(g=>`
    <div class="sb-group-label">${g.group}</div>
    ${g.items.map(it=>`<div class="sb-item${state.page===it.id?' active':''}" onclick="showPage('${it.id}')" title="${it.label}">
      ${icon(it.icon)} <span>${it.label}</span>
    </div>`).join('')}
  `).join('');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg,type='success'){
  const div=document.createElement('div');
  div.className=`toast-item ${type}`;
  div.innerHTML=`${type==='success'?'✓':'⚠'} ${msg}`;
  document.getElementById('toast').appendChild(div);
  setTimeout(()=>div.remove(),3000);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(title,body,footer=''){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}

// ── Search ────────────────────────────────────────────────────────────────────
const SEARCH_DATA=[
  ...state.functions.map(f=>({type:'Event',label:f.client,sub:f.type+' · UGX '+f.contract.toLocaleString(),color:'badge-amber',page:'functions'})),
  ...state.receipts.map(r=>({type:'Receipt',label:r.rn,sub:r.client+' · UGX '+r.amount.toLocaleString(),color:'badge-green',page:'client-receipts'})),
  ...state.products.map(p=>({type:'Product',label:p.name,sub:'SKU: '+p.sku,color:'badge-blue',page:'products'})),
  ...state.receivables.map(r=>({type:'Client',label:r.client,sub:'Balance: UGX '+r.balance.toLocaleString(),color:'badge-muted',page:'receivables'})),
  {type:'Package',label:'Birthday Package',sub:'UGX 150,000',color:'badge-amber',page:'packages'},
  {type:'Account',label:'Cash Account',sub:'Code: CASH-001',color:'badge-blue',page:'accounts'},
];
function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(),50);
}
function closeSearch(){document.getElementById('search-overlay').classList.remove('open');document.getElementById('search-input').value='';document.getElementById('search-results').innerHTML=''}
function handleSearch(q){
  const r=document.getElementById('search-results');
  if(!q||q.length<2){r.innerHTML='<div style="padding:16px;text-align:center;font-size:12px;color:var(--dim)">Type 2+ characters to search</div>';return}
  const hits=SEARCH_DATA.filter(d=>d.label.toLowerCase().includes(q.toLowerCase())||d.sub.toLowerCase().includes(q.toLowerCase()));
  r.innerHTML=hits.length?hits.map(h=>`<div class="sr-item" onclick="closeSearch();showPage('${h.page}');toast('Navigated to ${h.label}')">
    ${icon('receipt',13)}
    <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">${h.label}</div><div style="font-size:11px;color:var(--muted)">${h.sub}</div></div>
    <span class="badge ${h.color} sr-type">${h.type}</span>
  </div>`).join('')
  :'<div style="padding:16px;text-align:center;font-size:12px;color:var(--dim)">No results for "'+q+'"</div>';
}
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch()}if(e.key==='Escape'){closeSearch();closeModal()}});

// ── Sidebar toggle ────────────────────────────────────────────────────────────
function toggleSidebar(){
  state.sidebarCollapsed=!state.sidebarCollapsed;

}

// ── Helpers ───────────────────────────────────────────────────────────────────
const ugx=n=>`UGX ${Number(n).toLocaleString()}`;
function statusBadge(s){const m={'paid':'badge-green','partial':'badge-amber','overdue':'badge-red','active':'badge-green','inactive':'badge-muted','pending':'badge-amber','matched':'badge-green','unmatched':'badge-amber','confirmed':'badge-blue'};return`<span class="badge ${m[s]||'badge-muted'}">${s.toUpperCase()}</span>`}

// ── Page router ───────────────────────────────────────────────────────────────
function showPage(id){
  state.page=id;
  // hide cart bar for non-shop
  if(id!=='shop'&&id!=='checkout'){document.getElementById('cart-bar').classList.remove('visible')}
  buildSidebar();
  document.getElementById('page-label').textContent=NAV.flatMap(g=>g.items).find(i=>i.id===id)?.label||id;
  const renders={
    dashboard:renderDashboard,sales:renderSales,functions:renderFunctions,
    accounts:renderAccounts,expenses:renderExpenses,'machine-hire':renderMachineHire,
    'vehicle-hire':renderVehicleHire,products:renderProducts,packages:renderPackages,
    ocr:renderOCR,'client-receipts':renderClientReceipts,'receipt-printing':renderReceiptPrinting,
    statements:renderStatements,reports:renderReports,
    receivables:renderReceivables,payables:renderPayables,
    drawings:renderDrawings,'custom-accounts':renderCustomAccounts,
    mtn:renderMtn,pesapal:renderPesapal,notifications:renderNotifications,
    admin:renderAdmin,shop:renderShop,checkout:renderCheckout,
  };
  const fn=renders[id]||renderComingSoon;
  document.getElementById('content').innerHTML=fn();
}

    <div class="kpi">${kpiCard('Mobile Money',ugx(state.sales.filter(s=>s.method==='MoMo').reduce((a,s)=>a+s.total,0)),'amber','MTN/Airtel','phone')}</div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Today's Sales</div></div>
    <table class="tbl">
      <thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>Method</th><th>Time</th><th></th></tr></thead>
      <tbody id="sales-tbody">
        ${state.sales.map(s=>`<tr>
          <td style="font-weight:500">${s.product}</td><td>${s.qty}</td>
          <td>${ugx(s.unit)}</td><td class="orange" style="font-weight:600">${ugx(s.total)}</td>
          <td>${statusBadge(s.method==='Cash'?'paid':'partial')}</td>
          <td style="color:var(--muted)">${s.time}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteSale(${s.id})">Delete</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}
function deleteSale(id){
  state.sales=state.sales.filter(s=>s.id!==id);
  toast('Sale deleted');showPage('sales');
}
function openSaleForm(){
  openModal('Record New Sale',`
    <div class="form-row"><div class="form-group"><label class="form-label">Product *</label>
      <select class="form-input" id="sale-product">${state.products.map(p=>`<option value="${p.id}" data-price="${p.price}">${p.name}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Quantity *</label><input type="number" min="1" value="1" class="form-input" id="sale-qty" oninput="calcSaleTotal()" /></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Unit Price (UGX)</label><input type="number" class="form-input" id="sale-price" oninput="calcSaleTotal()" /></div>
      <div class="form-group"><label class="form-label">Payment Method</label>
        <select class="form-input" id="sale-method"><option>Cash</option><option>MoMo</option></select></div></div>
    <div style="margin-top:8px;padding:10px;background:var(--surface2);border-radius:var(--r-sm);font-size:13px">Total: <b class="orange" id="sale-total">UGX 0</b></div>`,
  `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitSale()">Record Sale</button>`);
  // Set initial price
  setTimeout(()=>{
    const sel=document.getElementById('sale-product');
    const opt=sel.options[sel.selectedIndex];
    document.getElementById('sale-price').value=opt.dataset.price||0;
    sel.onchange=()=>{const o=sel.options[sel.selectedIndex];document.getElementById('sale-price').value=o.dataset.price||0;calcSaleTotal()};
    calcSaleTotal();
  },50);
}
function calcSaleTotal(){
  const qty=parseFloat(document.getElementById('sale-qty')?.value||0);
  const price=parseFloat(document.getElementById('sale-price')?.value||0);
  const el=document.getElementById('sale-total');
  if(el)el.textContent=ugx(qty*price);
}
function submitSale(){
  const sel=document.getElementById('sale-product');
  const product=state.products.find(p=>p.id===parseInt(sel.value));
  const qty=parseInt(document.getElementById('sale-qty').value);
  const price=parseFloat(document.getElementById('sale-price').value);
  const method=document.getElementById('sale-method').value;
  if(!qty||!price){toast('Please fill all fields','error');return}
  const now=new Date();
  state.sales.push({id:state.nextSaleId++,product:product.name,qty,unit:price,total:qty*price,method,date:now.toISOString().split('T')[0],time:now.toTimeString().slice(0,5)});
  state.dayBalance.sales+=qty*price;
  closeModal();toast(`Sale recorded! ${ugx(qty*price)}`);showPage('sales');
}

function matchMtn(id){
  const t=state.mtnTxns.find(t=>t.id===id);
  openModal('Match MTN Transaction',`
    <div style="padding:10px;background:var(--surface2);border-radius:var(--r-sm);margin-bottom:12px;font-size:12px">

    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Select matching receivable:</div>
    ${state.receivables.filter(r=>r.status!=='paid').map(r=>`

}
function confirmMtnMatch(txnId,recId){
  const t=state.mtnTxns.find(t=>t.id===txnId);
  const r=state.receivables.find(r=>r.id===recId);
  t.status='matched';
  r.paid+=t.amount;r.balance=Math.max(0,r.balance-t.amount);r.status=r.balance<=0?'paid':'partial';
  closeModal();toast(`Matched! ${t.name||t.payer} → ${r.client}`);showPage('mtn');
}
function disputeMtn(id){const t=state.mtnTxns.find(t=>t.id===id);t.status='disputed';toast('Dispute reported for '+t.txnId);showPage('mtn')}

function calcRPTotal(){const rows=document.querySelectorAll('#rp-items > div');let t=0;rows.forEach(r=>{const q=parseFloat(r.querySelectorAll('input')[1]?.value)||0;const p=parseFloat(r.querySelectorAll('input')[2]?.value)||0;t+=q*p});const el=document.getElementById('rp-total');if(el)el.textContent=`UGX ${t.toLocaleString()}`}
function generateRPReceipt(){
  const name=document.getElementById('rp-name')?.value||'Walk-in Customer';
  const rows=document.querySelectorAll('#rp-items > div');
  let items=[],total=0;
  rows.forEach(r=>{const n=r.querySelectorAll('input')[0]?.value;const q=parseFloat(r.querySelectorAll('input')[1]?.value)||0;const p=parseFloat(r.querySelectorAll('input')[2]?.value)||0;if(n&&q&&p){items.push({n,q,p,t:q*p});total+=q*p}});
  if(!items.length){toast('Add at least one item','error');return}
  const today=new Date().toISOString().split('T')[0].replace(/-/g,'');
  const rn=`RCP-${today}-${Math.floor(Math.random()*9000+1000)}`;
  document.getElementById('rp-receipt-body').innerHTML=`
    <div style="border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:8px 0;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between"><span>Receipt #</span><b>${rn}</b></div>
      <div style="display:flex;justify-content:space-between"><span>Customer</span><b>${name}</b></div>
      <div style="display:flex;justify-content:space-between"><span>Date</span><b>${new Date().toLocaleDateString()}</b></div>
    </div>
    ${items.map(i=>`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>${i.n} ×${i.q}</span><b>UGX ${i.t.toLocaleString()}</b></div>`).join('')}
    <div style="border-top:1px dashed #ccc;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700"><span>TOTAL</span><span style="color:#0B6623">UGX ${total.toLocaleString()}</span></div>
    <div style="text-align:center;margin-top:10px;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:9px">
      <div style="font-weight:700;letter-spacing:2px;font-size:10px">▐█▌▐▐█▐▌▌▐█</div>
      <div style="color:#999;margin-top:2px">Scan to verify • ${rn}</div>
    </div>`;
  toast(`Receipt ${rn} generated with QR code`);
}

function updateCart(id,delta){
  const item=state.cart.find(i=>i.id===id);
  const product=SHOP_PRODUCTS.find(p=>p.id===id);
  if(!item&&delta>0){state.cart.push({id,size:product.size,price:product.price,qty:1})}
  else if(item){item.qty+=delta;if(item.qty<=0)state.cart=state.cart.filter(i=>i.id!==id)}
  showPage('shop');
}

function renderSimpleModule(title,ic,sub,tableData,btnLabel,btnFn){
  const [headers,...rows]=tableData;
  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div><div style="font-size:20px;font-weight:700">${title}</div><div style="font-size:12px;color:var(--muted)">${sub}</div></div>
    <button class="btn btn-primary" onclick="${btnFn}()">+ ${btnLabel}</button>
  </div>
  <div class="card">
    <table class="tbl">
      <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(row=>`<tr>${row.map((c,i)=>{
        if(c==='paid'||c==='active'||c==='matched')return`<td>${statusBadge(c)}</td>`;
        if(c==='pending'||c==='partial'||c==='unmatched')return`<td>${statusBadge(c)}</td>`;
        if(c==='inactive')return`<td>${statusBadge(c)}</td>`;
        if(i===headers.findIndex(h=>h==='Amount')||i===headers.findIndex(h=>h==='Cost'))return`<td class="orange" style="font-weight:600">${c}</td>`;
        return`<td>${c}</td>`;
      }).join('')}</tr>`).join('')}</tbody>
    </table>
  </div>`;
}
